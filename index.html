<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Documentos Digitales</title>

<style>

:root{
    --bg:#f5f5f5;
    --card:#ffffff;
    --text:#222;
    --shadow:0 4px 10px rgba(0,0,0,.08);
}

@media(prefers-color-scheme:dark){
:root{
    --bg:#121212;
    --card:#1f1f1f;
    --text:#eee;
    --shadow:0 4px 10px rgba(0,0,0,.35);
}
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:system-ui,sans-serif;
    background:var(--bg);
    color:var(--text);
    display:flex;
    justify-content:center;
}

.app{
    width:100%;
    max-width:430px;
    padding:20px;
}

h1{
    text-align:center;
    margin:10px 0 24px;
}

.card{
    display:block;
    text-decoration:none;
    color:inherit;
    background:var(--card);
    border-radius:16px;
    padding:16px;
    margin:14px 0;
    box-shadow:var(--shadow);
    border-left:8px solid;
    transition:.2s;
}

.card:hover{
    transform:translateY(-2px);
}

.green{
    border-color:#2e7d32;
}

.yellow{
    border-color:#f9a825;
}

.red{
    border-color:#c62828;
}

.title{
    font-weight:700;
    margin-bottom:12px;
    font-size:1.05rem;
}

.row{
    display:flex;
    justify-content:space-between;
    font-size:.95rem;
}

#loginOverlay{
    position:fixed;
    inset:0;
    background:var(--bg);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

#loginBox{
    width:90%;
    max-width:340px;
    background:var(--card);
    padding:30px;
    border-radius:16px;
    text-align:center;
    box-shadow:var(--shadow);
}

#loginBox input[type=password],
#loginBox input[type=text]{
    width:100%;
    padding:10px;
    margin:12px 0;
}

#loginBox button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#1976d2;
    color:#fff;
    cursor:pointer;
}

#error{
    color:#c62828;
    height:20px;
    margin-top:10px;
}

#siteContent{
    display:none;
}

</style>

</head>

<body>

<div id="loginOverlay">

    <div id="loginBox">

        <h2 id="loginTitle"></h2>

        <p>Ingrese contraseña</p>

        <input
            id="password"
            type="password"
            autocomplete="off"
        >

        <label>

            <input
                id="showPassword"
                type="checkbox"
            >

            Mostrar contraseña

        </label>

        <br><br>

        <button id="btnLogin">

            INGRESAR

        </button>

        <div id="error"></div>

    </div>

</div>

<div id="siteContent">

    <div class="app">

        <h1 id="pageTitle"></h1>

        <div id="lista"></div>

    </div>

</div>

<script>

/*==========================================
CONFIGURACIÓN
==========================================*/

const CONFIG={

    patente:"SCPP21",

    vehiculo:"Chery Tiggo 8 Pro",

    año:2022,

    password:"mmorales"

};

const BASE_URL=`https://respdocs.github.io/${CONFIG.patente.toLowerCase()}/`;

/*==========================================
DOCUMENTOS
==========================================*/

const DOCUMENTOS=[

{
    titulo:"Permiso de Circulación",
    archivo:"permiso-circulacion",
    vence:"2026-08-31"
},

{
    titulo:"Seguro Obligatorio (SOAP)",
    archivo:"soap",
    vence:"2027-03-31"
},

{
    titulo:"Revisión Técnica",
    archivo:"revision-tecnica",
    vence:"2027-04-30"
},

{
    titulo:"Revisión de Gases",
    archivo:"revision-gases",
    vence:"2027-04-30"
},

{
    titulo:"Certificado de inscripción (Padron)",
    archivo:"inscripcion"
},

{
    titulo:"Normativa Legal",
    archivo:"marco-legal"
}

];

/*==========================================
REFERENCIAS
==========================================*/

const pageTitle=document.getElementById("pageTitle");
const loginTitle=document.getElementById("loginTitle");
const lista=document.getElementById("lista");

const loginOverlay=document.getElementById("loginOverlay");
const siteContent=document.getElementById("siteContent");

const password=document.getElementById("password");
const showPassword=document.getElementById("showPassword");
const btnLogin=document.getElementById("btnLogin");
const error=document.getElementById("error");

pageTitle.textContent=`Documentos Digitales ${CONFIG.patente}`;
loginTitle.textContent=`Documentos Digitales ${CONFIG.patente}`;

/*==========================================
FUNCIONES
==========================================*/

function formatearFecha(fecha){

    const d=new Date(fecha+"T00:00:00");

    return `${String(d.getDate()).padStart(2,"0")}/${
        String(d.getMonth()+1).padStart(2,"0")
    }/${d.getFullYear()}`;

}

function obtenerEstado(fecha){

    const hoy=new Date();

    hoy.setHours(0,0,0,0);

    const vence=new Date(fecha+"T00:00:00");

    const dias=Math.ceil((vence-hoy)/86400000);

    let color="green";

    if(dias<60){

        color="red";

    }else if(dias<=120){

        color="yellow";

    }

    return{

        dias,

        color

    };

}

function crearTarjeta(doc){
        const card = document.createElement("a");

    card.href = BASE_URL + doc.archivo;

    if(doc.vence){

        const estado = obtenerEstado(doc.vence);

        card.className = `card ${estado.color}`;

        card.innerHTML = `
            <div class="title">
                🔗 ${doc.titulo}
            </div>

            <div class="row">
                <span>
                    📅 Vence: ${formatearFecha(doc.vence)}
                </span>

                <span>
                    ${
                        estado.dias < 0
                        ? "🔴 VENCIDO"
                        : `⏳ Faltan ${estado.dias} días`
                    }
                </span>
            </div>
        `;

    }else{

        card.className = "card green";

        card.innerHTML = `
            <div class="title">
                📘 ${doc.titulo}
            </div>
        `;

    }

    return card;

}

/*==========================================
RENDERIZADO
==========================================*/

function render(){

    lista.innerHTML = "";

    DOCUMENTOS.forEach(doc=>{

        lista.appendChild(

            crearTarjeta(doc)

        );

    });

}

/*==========================================
LOGIN
==========================================*/

function mostrarPortal(){

    loginOverlay.style.display="none";

    siteContent.style.display="block";

}

function validarLogin(){

    if(password.value!==CONFIG.password){

        error.textContent="Contraseña incorrecta";

        password.focus();

        password.select();

        return;

    }

    sessionStorage.setItem("portal_login","ok");

    mostrarPortal();

}

showPassword.addEventListener("change",()=>{

    password.type=

        showPassword.checked

        ? "text"

        : "password";

});

btnLogin.addEventListener("click",validarLogin);

password.addEventListener("keydown",e=>{

    if(e.key==="Enter"){

        validarLogin();

    }

});

/*==========================================
INICIALIZACIÓN
==========================================*/

render();

if(sessionStorage.getItem("portal_login")==="ok"){

    mostrarPortal();

}else{

    password.focus();

}

</script>

</body>

</html>
